name: Tests & Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Cache uv and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-

      - name: Install dependencies with dev extras
        run: uv sync --all-extras

      - name: Verify pytest installation
        run: uv run pytest --version

      - name: Debug formatter file
        run: |
          echo "===== COMMIT ====="
          git rev-parse HEAD

          echo "===== formatter.py ====="
          sed -n '75,105p' intelgraph/core/reporting/formatter.py

          echo "===== Search for old f-string ====="
          grep -n "_code_escape('\\\\n'.join(code_buf))" intelgraph/core/reporting/formatter.py || echo "Old syntax not found"

      - name: Lint with black
        run: uv run black --check intelgraph tests
        continue-on-error: true

      - name: Lint with ruff
        run: uv run ruff check intelgraph tests
        continue-on-error: true

      - name: Type check with mypy
        run: uv run mypy intelgraph
        continue-on-error: true

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --cov=intelgraph --cov-report=xml --cov-report=html --cov-report=term-missing

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - run: uv sync --all-extras

      - name: Run security checks with bandit
        run: uv run bandit -r intelgraph -ll -q
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: success()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - run: uv sync --all-extras

      - name: Build distribution
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
